name: Bug Report
description: Report a bug
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps or code to trigger the bug.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `PACKAGE --version` or commit SHA.
    validations:
      required: true
